<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TARBOUCH SMP | القائمة الرسمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* خلفية ماينكرافت بنظام Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.imgur.com/vHqPZ8L.png') center/cover no-repeat;
            opacity: 0.3;
            z-index: -1;
        }

        /* الحاوية الرئيسية 3D */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            background: rgba(43, 33, 25, 0.95); /* لون خشبي غامق */
            border: 6px solid #ffca28; /* إطار ذهبي */
            border-radius: 20px;
            padding: 30px;
            box-shadow: 10px 10px 0px #000;
            text-align: center;
        }

        /* الهيدر: اللوغو والاسم */
        .flex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #4a3828;
        }

        .glowing-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffca28;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 1px;
        }

        /* اللوغو بكسل طربوش (على اليمين فقط) */
        .pixel-tarbouch {
            width: 45px;
            height: 35px;
            background: #be0000;
            position: relative;
            box-shadow: 
                -4px 4px 0 0 #be0000, 4px 4px 0 0 #be0000,
                0 8px 0 0 #be0000, -4px 8px 0 0 #be0000, 4px 8px 0 0 #be0000,
                2px -6px 0 0 #000; /* الخيط */
            border-bottom: 3px solid #8e0000;
        }

        /* الأزرار العمودية 3D */
        .vertical-nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .mc-btn {
            background: #7a7a7a;
            border: 4px solid #000;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -4px -4px 0 #444, 0 6px 0 #000;
            transition: 0.1s;
            text-shadow: 2px 2px 0 #000;
        }

        .mc-btn:active {
            transform: translateY(4px);
            box-shadow: inset -4px -4px 0 #444, 0 2px 0 #000;
        }

        .btn-home { background: #388e3c; box-shadow: inset -4px -4px 0 #1b5e20, 0 6px 0 #000; }
        .btn-staff { background: #be0000; box-shadow: inset -4px -4px 0 #8e0000, 0 6px 0 #000; }
        .btn-discord { background: #5865F2; box-shadow: inset -4px -4px 0 #3b44a3, 0 6px 0 #000; }

        /* منطقة المحتوى الديناميكي */
        .content-area {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 20px;
            display: none;
        }

        .content-area.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الفورم */
        .form-group { text-align: right; margin-bottom: 15px; }
        label { color: #ffca28; display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; background: #222; border: 2px solid #ffca28;
            color: white; font-family: inherit;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #777;
        }

        .success-msg { color: #2ecc71; font-weight: bold; margin-top: 15px; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="flex-header">
        <div class="glowing-title">TARBOUCH SMP</div>
        <div class="pixel-tarbouch"></div>
    </div>

    <div class="vertical-nav">
        <button class="mc-btn btn-home" onclick="showContent('home')">🏠 الرئيسية</button>
        <button class="mc-btn btn-staff" onclick="showContent('staff')">📜 تقديم Staff</button>
        <a href="https://discord.gg/wFEPWrdJav" target="_blank" style="text-decoration: none;">
            <button class="mc-btn btn-discord" style="width: 100%;">💬 ديسكورد</button>
        </a>
    </div>

    <div id="home-content" class="content-area active">
        <p style="color: #ccc;">مرحباً بك في لوحة تحكم طربوش SMP. اختر من القائمة أعلاه للبدء.</p>
    </div>

    <div id="staff-content" class="content-area">
        <h3 style="color: #ffca28; margin-bottom: 15px;">إستمارة التقديم</h3>
        <form id="applyForm">
            <div class="form-group">
                <label>الاسم في اللعبة:</label>
                <input type="text" id="ign" required>
            </div>
            <div class="form-group">
                <label>الرتبة:</label>
                <select id="role">
                    <option>Helper</option>
                    <option>Moderator</option>
                    <option>Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>الخبرة (20 حرف+):</label>
                <textarea id="exp" minlength="20" required></textarea>
                <small id="charCount" style="color: #be0000;">0 / 20</small>
            </div>
            <button type="submit" class="mc-btn btn-home" style="width: 100%; margin-top: 10px;">إرسال الطلب</button>
        </form>
        <div id="result" class="success-msg"></div>
    </div>

    <div class="footer">Secured by Sherlock Systems | 2026</div>
</div>

<script>
    function showContent(id) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.getElementById(id + '-content').classList.add('active');
    }

    const exp = document.getElementById('exp');
    const count = document.getElementById('charCount');
    exp.addEventListener('input', () => {
        const len = exp.value.length;
        count.innerText = len + " / 20";
        count.style.color = len < 20 ? "#be0000" : "#2ecc71";
    });

    document.getElementById('applyForm').onsubmit = function(e) {
        e.preventDefault();
        const ign = document.getElementById('ign').value;
        document.getElementById('result').innerText = "✅ تم الإرسال بنجاح! حل Ticket دابا في الديسكورد يا " + ign;
        this.reset();
        count.innerText = "0 / 20";
    };
</script>

</body>
</html>
