<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - تقديم الإدارة والرتب</title>
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-gold: #ffcc00;
            --discord-color: #5865F2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 204, 0, 0.2);
            max-width: 550px;
            width: 90%;
            text-align: center;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-gold);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            margin-bottom: 10px;
            display: block;
        }

        .discord-btn {
            background-color: var(--discord-color);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 30px;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: 0.3s;
        }

        .discord-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .status-tag {
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 20px;
            display: block;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: white; }

        .form-group { text-align: right; margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gold);
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-red), #990000);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(204, 0, 0, 0.4); }

        /* Notification Styling */
        #success-msg {
            display: none;
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo-text">TARBOUCH</span>
        
        <button class="discord-btn" onclick="discordLogin()">
            <span>Sign in with Discord</span>
        </button>
        <span class="status-tag" id="login-status">يرجى تسجيل الدخول لربط حسابك</span>

        <h1>استمارة التقديم (إدارة / صناع محتوى)</h1>

        <div id="success-msg">
            تم إرسال طلبك بنجاح! ✅<br>
            يرجى فتح تذكرة (Ticket) في الديسكورد وانتظار رد الإدارة بالقبول أو الرفض.
        </div>

        <form id="applyForm" action="https://formspree.io/f/mykolbgw" method="POST">
            
            <div class="form-group">
                <label>الاسم داخل اللعبة (IGN):</label>
                <input type="text" name="ign" required>
            </div>

            <div class="form-group">
                <label>الرتبة المطلوبة:</label>
                <select name="role">
                    <optgroup label="طاقم الإدارة">
                        <option value="Helper">Helper</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Admin">Admin</option>
                        <option value="Developer">Developer (Dev)</option>
                    </optgroup>
                    <optgroup label="صناع المحتوى">
                        <option value="YouTube">YouTube Rank 🎥</option>
                        <option value="TikToker">TikToker Rank 📱</option>
                        <option value="Streamer">Streamer Rank 💜</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label>السن:</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>الخبرة السابقة أو رابط قناتك:</label>
                <textarea name="experience" placeholder="اكتب خبرتك أو حط رابط قناتك هنا..." required></textarea>
            </div>

            <div class="form-group">
                <label>لماذا تريد الانضمام إلينا؟</label>
                <textarea name="why_us" required></textarea>
            </div>

            <div class="form-group">
                <label>حساب الديسكورد (Discord Tag):</label>
                <input type="text" name="discord" id="discord-input" placeholder="Username" required>
            </div>

            <input type="hidden" name="_message" value="🔔 تقديم جديد! يرجى مراجعة الـ Ticket.">

            <button type="submit" class="submit-btn">إرسال الطلب 📥</button>

        </form>

        <div class="footer">
            🛡️ Secured by <b>Sherlock Systems</b>
        </div>
    </div>

    <script>
        // لربط الديسكورد
        function discordLogin() {
            const status = document.getElementById('login-status');
            const btn = document.querySelector('.discord-btn');
            
            btn.innerHTML = "Logging in...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                const username = prompt("دخل الـ Discord Username ديالك للربط:");
                if(username) {
                    document.getElementById('discord-input').value = username;
                    status.innerHTML = "✅ تم ربط الحساب: " + username;
                    status.style.color = "#43b581";
                    btn.innerHTML = "Connected as " + username;
                    btn.style.backgroundColor = "#43b581";
                } else {
                    btn.innerHTML = "Sign in with Discord";
                    btn.style.opacity = "1";
                }
            }, 1000);
        }

        // باش تطلع الرسالة ديال الـ Ticket ملي يبرك على Submit
