<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - التقديم الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-gold: #ffcc00;
            --input-bg: #111;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar: Logo Right, Links Center */
        nav {
            background: rgba(22, 22, 22, 0.95);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary-red); 
            text-decoration: none; 
            cursor: pointer;
            animation: flagWave 3s ease-in-out infinite;
            text-shadow: 2px 2px 10px rgba(204, 0, 0, 0.4);
            order: 2;
        }

        @keyframes flagWave {
            0%, 100% { transform: rotate(-2deg) skewX(2deg); }
            50% { transform: rotate(2deg) skewX(-2deg); }
        }

        .nav-links { 
            display: flex; 
            gap: 25px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            order: 1;
        }

        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a:hover { color: var(--primary-red); }

        .section { display: none; padding: 60px 20px; animation: fadeIn 0.5s ease-in-out; min-height: 70vh; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .apply-container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin: 0 auto;
        }

        h2 { text-align: center; color: var(--text-gold); margin-bottom: 25px; }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0 25px;
        }

        .role-option {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
        }

        .role-option:hover { border-color: var(--text-gold); }
        .role-option.selected { border-color: var(--primary-red); background: rgba(255, 0, 0, 0.15); }

        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-gold); font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444;
            background: var(--input-bg); color: white; box-sizing: border-box; outline: none;
        }

        .submit-btn {
            width: 100%; background: var(--primary-red); color: white; padding: 16px; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #cc0000; transform: translateY(-2px); }

        .footer { text-align: center; padding: 40px; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo" onclick="showSection('home')">TARBOUCH SMP</div>
        <div class="nav-links">
            <a onclick="showSection('home')"><i class="fas fa-home"></i> الرئيسية</a>
            <a onclick="showSection('apply')"><i class="fas fa-user-plus"></i> تقديم Staff</a>
            <a href="https://discord.gg/wFEPWrdJav" target="_blank"><i class="fab fa-discord"></i> ديسكورد</a>
        </div>
    </nav>

    <div id="home" class="section active">
        <div style="text-align: center; padding-top: 100px;">
            <h1 style="font-size: 3rem; color: var(--text-gold);">مرحباً بك في طربوش SMP</h1>
            <p style="color: #888;">سيرفر Survival مغربي أصيل.</p>
        </div>
    </div>

    <div id="apply" class="section">
        <div class="apply-container">
            <h2>تقديم طلب رتبة 🎯</h2>
            
            <div class="input-group">
                <label>🎮 الاسم داخل اللعبة (IGN):</label>
                <input type="text" id="ign" placeholder="TarbouchPlayer">
            </div>

            <label>⭐ اختر الرتبة:</label>
            <div class="role-grid">
                <div class="role-option" onclick="selectRole(this, 'Sr Admin')">👑 | Sr Admin</div>
                <div class="role-option" onclick="selectRole(this, 'Admin')">🛡️ | Admin</div>
                <div class="role-option" onclick="selectRole(this, 'Sr Mod')">⚔️ | Sr Mod</div>
                <div class="role-option" onclick="selectRole(this, 'Helper')">🤝 | Helper</div>
                <div class="role-option" onclick="selectRole(this, 'YouTuber')">🎥 | YouTuber</div>
                <div class="role-option" onclick="selectRole(this, 'TikToker')">📱 | TikToker</div>
            </div>

            <div class="input-group">
                <label>📜 الخبرة (20 حرف على الأقل):</label>
                <textarea id="exp" rows="4" placeholder="اكتب خبرتك هنا..."></textarea>
            </div>

            <div class="input-group">
                <label>💬 ديسكورد (Username):</label>
                <input type="text" id="discord_tag" placeholder="sherlock1181">
            </div>

            <button class="submit-btn" onclick="sendToDiscord()">إرسال الطلب 🚀</button>
        </div>
    </div>

    <div class="footer">🛡️ Secured by Sherlock Systems | 2026</div>

    <script>
        let selectedRole = "";

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectRole(element, role) {
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedRole = role;
        }

        function sendToDiscord() {
            const ign = document.getElementById('ign').value;
            const exp = document.getElementById('exp').value;
            const discord = document.getElementById('discord_tag').value;
            
            // هاهو الـ URL الجديد ديالك محطوط ف بلاصتو
            const webhookURL = "https://discord.com/api/webhooks/1503396690336420002/vlqbGHaEvGRQlCCPKOJRL6O8gZ5rbbaZSNps8dVqg8RalsuhvkKFMnQTysPbT_a-ST7g";

            if (!ign || !selectedRole || exp.length < 20 || !discord) {
                alert("⚠️ كمل المعلومات كاملة! (الخبرة لازم تكون +20 حرف)");
                return;
            }

            const payload = {
                username: "TARBOUCH SMP APPLY",
                content: "🔔 **تقديم جديد وصل للسيرفر!**",
                embeds: [{
                    title: "📄 تفاصيل طلب الانضمام",
                    color: 16711680,
                    fields: [
                        { name: "🎮 IGN", value: `\`${ign}\``, inline: true },
                        { name: "🛡️ الرتبة", value: `**${selectedRole}**`, inline: true },
                        { name: "💬 ديسكورد", value: discord, inline: true },
                        { name: "📜 الخبرة", value: `\`\`\`${exp}\`\`\`` }
                    ],
                    footer: { text: "Sherlock Systems Protection" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok || res.status === 204) {
                    alert("✅ تم إرسال طلبك بنجاح! هاد الرابط غيبقى خدام ديما.");
                    location.reload();
                } else {
                    alert("❌ ديسكورد رفض الطلب. تأكد أن الـ Webhook URL صحيح.");
                }
            })
            .catch(err => {
                alert("❌ مشكل فـ الكونيكسيون.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
