<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - التقديم الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-gold: #ffcc00;
            --input-bg: #111;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar المعدل: اللوغو على اليمين والأزرار ف الوسط */
        nav {
            background: rgba(22, 22, 22, 0.95);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary-red); 
            text-decoration: none; 
            cursor: pointer;
            animation: flagWave 3s ease-in-out infinite;
            display: inline-block;
            text-shadow: 2px 2px 10px rgba(204, 0, 0, 0.4);
        }

        @keyframes flagWave {
            0%, 100% { transform: rotate(-2deg) skewX(2deg); }
            50% { transform: rotate(2deg) skewX(-2deg); }
        }

        .nav-links { 
            display: flex; 
            gap: 25px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a:hover { color: var(--primary-red); }

        /* Sections */
        .section { display: none; padding: 60px 20px; animation: fadeIn 0.5s ease-in-out; min-height: 70vh; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Container */
        .apply-container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin: 0 auto;
        }

        h2 { text-align: center; color: var(--text-gold); margin-bottom: 25px; }

        /* Role Selection Grid */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0 25px;
        }

        .role-option {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
            direction: ltr; /* باش يجي الـ Emoji والخط مقادين */
        }

        .role-option:hover
