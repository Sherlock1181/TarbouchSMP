<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP | الموقع الرسمي</title>
    <style>
        :root {
            --mc-red: #be0000;
            --mc-green: #388e3c;
            --mc-gold: #ffca28;
            --mc-dirt: #3d2b1f;
            --dark-panel: rgba(0, 0, 0, 0.85);
            --3d-shadow: 6px 6px 0px #000;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(45deg, #1a1a1a, #2c3e50);
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        /* --- Minecraft Pixel Tarbouch Logo --- */
        .pixel-tarbouch {
            width: 50px;
            height: 40px;
            display: inline-block;
            position: relative;
            background: var(--mc-red);
            box-shadow: 
                -5px 5px 0 0 var(--mc-red), 5px 5px 0 0 var(--mc-red),
                0 10px 0 0 var(--mc-red), -5px 10px 0 0 var(--mc-red), 5px 10px 0 0 var(--mc-red),
                0 -5px 0 0 #000; /* الخيط ديال الطربوش */
            margin-left: 20px;
            border-bottom: 4px solid #8e0000;
        }

        nav {
            background: var(--mc-dirt);
            border-bottom: 4px solid var(--mc-gold);
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0; z-index: 100;
        }

        .nav-brand { display: flex; align-items: center; text-decoration: none; }
        .nav-brand span { font-size: 1.8rem; font-weight: 900; color: var(--mc-gold); text-shadow: 3px 3px 0 #000; }

        .nav-links a {
            color: white; text-decoration: none; font-weight: bold;
            margin-right: 20px; padding: 10px 15px;
            background: #555; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #333;
            transition: 0.1s; cursor: pointer;
        }
        .nav-links a:hover { transform: translateY(-2px); background: var(--mc-green); box-shadow: inset -3px -3px 0 #1b5e20; }

        /* --- 3D Cards --- */
        .section { display: none; padding: 50px 20px; text-align: center; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-3d {
            background: var(--dark-panel);
            border: 4px solid var(--mc-gold);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--3d-shadow);
            position: relative;
        }

        .mc-button {
            background: var(--mc-green);
            color: white; padding: 15px 30px;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0 #1b5e20;
            font-weight: bold; font-size: 1.1rem;
            cursor: pointer; display: inline-block;
            margin: 20px 0; transition: 0.1s;
        }
        .mc-button:active { transform: translate(2px, 2px); box-shadow: inset 0 0 0 #000; }

        /* --- Form Styling --- */
        .form-group { text-align: right; margin-bottom: 20px; }
        label { color: var(--mc-gold); display: block; margin-bottom: 10px; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; background: #222; border: 3px solid var(--mc-dirt);
            color: #2ecc71; font-family: 'Courier New', Courier, monospace; font-weight: bold;
            box-sizing: border-box;
        }

        .ip-display {
            font-size: 2rem; color: #2ecc71; 
            background: #000; padding: 20px;
            border: 2px dashed var(--mc-gold);
            display: block; margin: 20px 0;
            text-shadow: 0 0 10px #2ecc71;
        }

        .footer { margin-top: 50px; color: #aaa; font-size: 0.8rem; padding: 20px; border-top: 2px solid var(--mc-dirt); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand" onclick="showSection('home')" style="cursor:pointer">
            <div class="pixel-tarbouch"></div>
            <span>طربوش SMP</span>
        </div>
        <div class="nav-links">
            <a onclick="showSection('home')">الرئيسية</a>
            <a onclick="showSection('apply')">تقديم Staff</a>
            <a href="https://discord.gg/wFEPWrdJav" target="_blank" style="background: #5865F2;">ديسكورد</a>
        </div>
    </nav>

    <div id="home" class="section active">
        <div class="card-3d">
            <h1 style="color: var(--mc-gold); text-shadow: 2px 2px #000;">عالم المغامرة كينتادرك!</h1>
            <p>سيرفر مغربي 100%، بقوة 24GB وحماية احترافية.</p>
            <div class="ip-display" id="ip" onclick="copyIP()">TARBOUCH.MC-SRV.COM</div>
            <p style="color: #777;">(اضغط على الـ IP للنسخ ودخول اللعبة)</p>
        </div>
    </div>

    <div id="apply" class="section">
        <div class="card-3d">
            <h2 style="color: var(--mc-gold);">استمارة الانضمام للطاقم</h2>
            <button class="mc-button" style="background:#5865F2" onclick="discordLogin()">ربط حساب ديسكورد</button>
            <p id="status" style="font-size:0.8rem; color: #888;">يجب الربط أولاً</p>

            <form id="applyForm" action="https://formspree.io/f/mykolbgw" method="POST">
                <div class="form-group">
                    <label>الاسم داخل اللعبة (IGN):</label>
                    <input type="text" name="ign" required>
                </div>
                <div class="form-group">
                    <label>الرتبة:</label>
                    <select name="role">
                        <option value="Helper">Helper</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Admin">Admin</option>
                        <option value="Sr.Admin">Sr. Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الخبرة (20 حرف+):</label>
                    <textarea name="experience" id="exp" minlength="20" required></textarea>
                    <small id="count" style="color:#aaa">الحروف: 0</small>
                </div>
                <input type="hidden" name="discord" id="discord-input">
                <button type="submit" class="mc-button">إرسال الطلب 📥</button>
            </form>
        </div>
    </div>

    <div class="footer">
        🛡️ نظام حماية <b>Sherlock Systems</b> | 2026
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function copyIP() {
            navigator.clipboard.writeText("TARBOUCH.MC-SRV.COM");
            alert("✅ تم نسخ الـ IP! نتسناوك في السيرفر.");
        }

        function discordLogin() {
            let user = prompt("اسم الديسكورد ديالك:");
            if(user) {
                document.getElementById('discord-input').value = user;
                document.getElementById('status').innerText = "✅ متصل: " + user;
                document.getElementById('status').style.color = "#2ecc71";
            }
        }

        const exp = document.getElementById('exp');
        exp.oninput = () => {
            document.getElementById('count').innerText = "الحروف: " + exp.value.length;
            document.getElementById('count').style.color = exp.value.length < 20 ? "#be0000" : "#2ecc71";
        };
    </script>
</body>
</html>
