<!-- زد هاد القسم لـ Dashboard Grid -->
<div class="dash-card" onclick="showSection('player-report')"><i class="fas fa-user-slash" style="color:#d32f2f;"></i><span>Report Player</span></div>

<!-- قسم التبليغ عن لاعب -->
<div id="player-report" class="section">
    <div style="background: var(--card-bg); padding: 40px; border-radius: 20px; max-width: 500px; margin: 0 auto; border: 1px solid #333;">
        <h2 style="color:var(--text-gold); text-align:center;">تبليغ عن لاعب 🚫</h2>
        <p style="text-align:center; font-size: 0.9rem; color: #aaa;">بلغ على أي لاعب خالف القوانين</p>
        
        <input type="text" id="p_target" placeholder="اسم اللاعب المشتكى به" style="width:100%; padding:14px; margin:10px 0; background:#111; border:1px solid #444; color:white; border-radius:8px;">
        <textarea id="p_reason" placeholder="شنو دار؟ (السبب بالتفصيل)" rows="3" style="width:100%; padding:14px; margin:10px 0; background:#111; border:1px solid #444; color:white; border-radius:8px;"></textarea>
        
        <label style="display:block; margin-top:10px; color:var(--text-gold); font-size:0.8rem;">إثبات (صورة من الجهاز):</label>
        <input type="file" id="p_file" accept="image/*" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #444; color:white; border-radius:8px;">
        
        <input type="text" id="p_discord" placeholder="Discord Username ديالك" style="width:100%; padding:14px; margin:10px 0; background:#111; border:1px solid #444; color:white; border-radius:8px;">
        <button onclick="uploadAndSend('player')" style="width:100%; background:var(--primary-red); color:white; padding:16px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">إرسال التقرير ⚖️</button>
    </div>
</div>

<script>
    // هاد الدالة هي اللي كتتكلف بكلشي (Upload + Webhook)
    async function uploadAndSend(type) {
        const webhookURL = "https://discord.com/api/webhooks/1503396690336420002/vlqbGHaEvGRQlCCPKOJRL6O8gZ5rbbaZSNps8dVqg8RalsuhvkKFMnQTysPbT_a-ST7g";
        
        let fileInput, title, fields;
        const formData = new FormData();

        if (type === 'player') {
            fileInput = document.getElementById('p_file');
            const target = document.getElementById('p_target').value;
            const reason = document.getElementById('p_reason').value;
            const discord = document.getElementById('p_discord').value;

            if (!target || !reason || !discord) return alert("عمر الخانات كاملة!");

            title = "🚫 بلاغ ضد لاعب";
            fields = [
                { name: "👤 المشتكى به", value: target, inline: true },
                { name: "💬 السبب", value: reason },
                { name: "🆔 المبلغ", value: discord, inline: true }
            ];
        } else {
            // كود الـ Bug Report بنفس الطريقة
            fileInput = document.getElementById('bug_file'); // تأكد تبدل ID فـ HTML لـ bug_file
            const bTitle = document.getElementById('bug_title').value;
            const bDetails = document.getElementById('bug_details').value;
            const bDiscord = document.getElementById('bug_discord').value;

            if (!bTitle || !bDetails || !bDiscord) return alert("عمر الخانات كاملة!");

            title = "🐛 تقرير Bug جديد";
            fields = [
                { name: "📌 العنوان", value: bTitle },
                { name: "📝 التفاصيل", value: bDetails },
                { name: "👤 المبلغ", value: bDiscord, inline: true }
            ];
        }

        // إعداد الـ Embed
        const embed = {
            title: title,
            color: type === 'player' ? 15548997 : 15105570,
            fields: fields,
            timestamp: new Date()
        };

        formData.append('payload_json', JSON.stringify({ embeds: [embed] }));

        // إضافة الصورة إذا كانت موجودة
        if (fileInput.files.length > 0) {
            formData.append('file', fileInput.files[0]);
        }

        try {
            const response = await fetch(webhookURL, { method: 'POST', body: formData });
            if (response.ok) {
                alert("✅ تم الإرسال بنجاح مع الصورة!");
                location.reload();
            } else {
                alert("❌ فشل الإرسال، تأكد من حجم الصورة.");
            }
        } catch (error) {
            console.error(error);
            alert("⚠️ وقع خطأ فني.");
        }
    }
</script>
