<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - الموقع الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gold: #ffcc00;
            --discord-color: #5865F2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: rgba(22, 22, 22, 0.95);
            padding: 20px 50px;
            display: flex;
            justify-content: center; /* رديت كلشي ف الوسط */
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-direction: column; /* ترتيب عمودي للوغو والأزرار */
            gap: 20px;
        }

        /* تحريك اللوغو بحال الراية */
        .nav-logo { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--primary-red); 
            text-decoration: none; 
            cursor: pointer;
            animation: wave 3s ease-in-out infinite;
            display: inline-block;
            text-shadow: 2px 2px 10px rgba(204, 0, 0, 0.5);
        }

        @keyframes wave {
            0%, 100% { transform: skewY(0deg); }
            25% { transform: skewY(2deg) translateY(-2px); }
            75% { transform: skewY(-2deg) translateY(2px); }
        }

        .nav-links { 
            display: flex; 
            gap: 30px; 
            justify-content: center;
        }

        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 8px; /* مسافة بين الأيقونة والنص */
            font-size: 1.1rem;
        }

        .nav-links a i { color: var(--text-gold); } /* لون الأيقونات */

        .nav-links a:hover { color: var(--primary-red); transform: scale(1.1); }

        /* Sections */
        .section { display: none; padding: 60px 20px; animation: fadeIn 0.5s ease-in-out; flex-grow: 1; }
        .section.active { display: flex; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Page - رديتها فارغة وأنيقة */
        .hero-content { text-align: center; }

        /* Apply Form */
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 204, 0, 0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }

        .form-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gold); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-family: inherit; }
        
        .submit-btn { width: 100%; background: linear-gradient(135deg, var(--primary-red), #990000); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }

        .footer { text-align: center; padding: 30px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo" onclick="showSection('home')">TARBOUCH SMP</div>
        <div class="nav-links">
            <a onclick="showSection('home')"><i class="fas fa-home"></i> الرئيسية</a>
            <a onclick="showSection('apply')"><i class="fas fa-user-plus"></i> تقديم Staff</a>
            <a href="https://discord.gg/wFEPWrdJav" target="_blank"><i class="fab fa-discord"></i> ديسكورد</a>
        </div>
    </nav>

    <div id="home" class="section active">
        <div class="hero-content">
            <i class="fas fa-cubes" style="font-size: 5rem; color: var(--card-bg); margin-bottom: 20px;"></i>
        </div>
    </div>

    <div id="apply" class="section">
        <div class="container">
            <h1 style="color: var(--text-gold); margin-bottom: 30px;">تقديم طاقم الإدارة</h1>
            <form id="applyForm" action="https://formspree.io/f/mykolbgw" method="POST">
                <div class="form-group">
                    <label>الاسم داخل اللعبة (IGN):</label>
                    <input type="text" name="ign" required>
                </div>
                <div class="form-group">
                    <label>الرتبة المطلوبة:</label>
                    <select name="role">
                        <option value="Helper">Helper</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Admin">Admin</option>
                        <option value="YouTube">YouTube</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الخبرة السابقة:</label>
                    <textarea name="experience" minlength="20" placeholder="اكتب هنا بوضوح..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">إرسال الطلب 📥</button>
            </form>
        </div>
    </div>

    <div class="footer">
        🛡️ Secured by <b>Sherlock Systems</b> | 2026
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        document.getElementById('applyForm').onsubmit = function() {
            alert("تم إرسال طلبك بنجاح! ✅");
        };
    </script>
</body>
</html>
