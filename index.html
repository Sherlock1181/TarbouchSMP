<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - التقديم الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-gold: #ffcc00;
            --input-bg: #111;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* Wave Header (Flag Style) */
        .nav-logo { 
            font-size: 3rem; 
            font-weight: 900; 
            color: var(--primary-red); 
            margin: 40px 0;
            animation: flagWave 3.5s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            cursor: default;
        }

        @keyframes flagWave {
            0%, 100% { transform: rotate(-1deg) translateY(0); }
            50% { transform: rotate(1.5deg) translateY(-5px); }
        }

        /* Navigation */
        .nav-links { display: flex; gap: 20px; margin-bottom: 30px; }
        .nav-links a { 
            color: white; text-decoration: none; font-weight: bold; 
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            transition: 0.3s; padding: 10px 25px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
        }
        .nav-links a:hover { background: rgba(255, 0, 0, 0.2); color: var(--primary-red); }

        /* Form Container */
        .apply-container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin-bottom: 50px;
        }

        h2 { text-align: center; color: var(--text-gold); margin-bottom: 25px; font-size: 1.5rem; }

        /* Role Selection Grid */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0 25px;
        }

        .role-option {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
        }

        .role-option:hover { border-color: var(--text-gold); background: #282828; }
        .role-option.selected { border-color: var(--primary-red); background: rgba(255, 0, 0, 0.15); }

        /* Inputs */
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-gold); font-size: 0.9rem; font-weight: 600; }
        input, textarea {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444;
            background: var(--input-bg); color: white; box-sizing: border-box;
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary-red); box-shadow: 0 0 8px rgba(255, 0, 0, 0.2); }

        /* Submit Button */
        .submit-btn {
            width: 100%; background: linear-gradient(to right, #b30000, #ff0000); 
            color: white; padding: 16px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4); }

        .footer { color: #444; font-size: 0.85rem; padding: 25px; border-top: 1px solid #222; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="nav-logo">TARBOUCH SMP</div>

    <div class="nav-links">
        <a onclick="location.reload()"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="https://discord.gg/wFEPWrdJav" target="_blank"><i class="fab fa-discord"></i> ديسكورد</a>
    </div>

    <div class="apply-container">
        <h2><i class="fas fa-edit"></i> تقديم طلب رتبة (Staff)</h2>
        
        <div class="input-group">
            <label>🎮 الاسم داخل اللعبة (IGN):</label>
            <input type="text" id="ign" placeholder="مثال: TarbouchPlayer">
        </div>

        <label>⭐ اختر الرتبة المطلوبة:</label>
        <div class="role-grid">
            <div class="role-option" onclick="selectRole(this, 'Sr Admin')">👑 | Sr Admin</div>
            <div class="role-option" onclick="selectRole(this, 'Admin')">🛡️ | Admin</div>
            <div class="role-option" onclick="selectRole(this, 'Sr Mod')">⚔️ | Sr Mod</div>
            <div class="role-option" onclick="selectRole(this, 'Helper')">🤝 | Helper</div>
            <div class="role-option" onclick="selectRole(this, 'YouTuber')">🎥 | YouTuber</div>
            <div class="role-option" onclick="selectRole(this, 'TikToker')">📱 | TikToker</div>
        </div>

        <div class="input-group">
            <label>📜 الخبرة والمهارات (20 حرف+):</label>
            <textarea id="exp" rows="4" placeholder="تحدث عن خبرتك في الإدارة أو صناعة المحتوى..."></textarea>
        </div>

        <div class="input-group">
            <label>💬 حساب الديسكورد (Username):</label>
            <input type="text" id="discord_tag" placeholder="مثال: sherlock1181">
        </div>

        <button class="submit-btn" onclick="sendToDiscord()">
            <span>إرسال الطلب</span> <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="footer">
        🛡️ Secured by <b>Sherlock Systems</b> | 2026
    </div>

    <script>
        let selectedRole = "";

        function selectRole(element, role) {
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedRole = role;
        }

        function sendToDiscord() {
            const ign = document.getElementById('ign').value;
            const exp = document.getElementById('exp').value;
            const discord = document.getElementById('discord_tag').value;
            
            // حط الـ Webhook URL ديالك هنا باش يخدم الإرسال
            const webhookURL = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN";

            if (!ign || !selectedRole || exp.length < 20 || !discord) {
                alert("⚠️ عفاك كمل المعلومات كاملة! (الخبرة لازم تكون كتر من 20 حرف)");
                return;
            }

            const payload = {
                username: "TARBOUCH SMP APPLY",
                avatar_url: "https://i.imgur.com/example.png", // اختياري
                embeds: [{
                    title: "📥 تقديم جديد على رتبة",
                    color: 16711680, // اللون الأحمر
                    fields: [
                        { name: "👤 اللاعب", value: `\`${ign}\``, inline: true },
                        { name: "🛡️ الرتبة", value: `**${selectedRole}**`, inline: true },
                        { name: "💬 ديسكورد", value: discord, inline: true },
                        { name: "📜 الخبرة", value: `\`\`\`${exp}\`\`\`` }
                    ],
                    footer: { text: "Tarbouch SMP Web System" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("✅ تم إرسال طلبك بنجاح! الإدارة غتجاوبك فـ Discord.");
                location.reload();
            }).catch(err => {
                alert("❌ وقع مشكل ف الإرسال. تأكد من Webhook URL.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
