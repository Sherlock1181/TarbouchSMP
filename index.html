<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARBOUCH SMP - الموقع الرسمي</title>
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gold: #ffcc00;
            --discord-color: #5865F2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #eeeeee;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar Design */
        nav {
            background: rgba(22, 22, 22, 0.95);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-gold);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover { color: var(--primary-red); }

        /* Main Content Sections */
        .section {
            display: none; /* مخفيين في البداية */
            padding: 60px 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .section.active { display: block; } /* كيبان غير اللي بركنا عليه */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.imgur.com/your-minecraft-bg.jpg'); /* تقدر تبدل التصويرة */
            background-size: cover;
        }

        .ip-box {
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px dashed var(--text-gold);
            display: inline-block;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Form Styling (نفس اللي كان عندنا) */
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 204, 0, 0.2);
            max-width: 550px;
            margin: 0 auto;
            text-align: center;
        }

        .form-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gold); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, var(--primary-red), #990000); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .discord-btn { background-color: var(--discord-color); color: white; padding: 10px; border-radius: 8px; border: none; width: 100%; margin-bottom: 20px; cursor: pointer; font-weight: bold; }

        .footer { text-align: center; padding: 40px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo" onclick="showSection('home')">TARBOUCH SMP</a>
        <div class="nav-links">
            <a onclick="showSection('home')">الرئيسية</a>
            <a onclick="showSection('apply')">تقديم Staff</a>
            <a href="https://discord.gg/your-link" target="_blank">ديسكورد</a>
        </div>
    </nav>

    <div id="home" class="section active">
        <div class="hero-content">
            <h1 style="font-size: 3.5rem; color: var(--text-gold);">مرحباً بك في طربوش SMP</h1>
            <p style="font-size: 1.2rem;">أفضل تجربة بقاء (Survival) في المغرب!</p>
            <div class="ip-box" onclick="copyIP()">
                <span>IP: <b id="server-ip">TARBOUCH.MC-SRV.COM</b></span> (اضغط للنسخ)
            </div>
        </div>
    </div>

    <div id="apply" class="section">
        <div class="container">
            <button class="discord-btn" onclick="discordLogin()">Sign in with Discord</button>
            <h2 id="login-status" style="font-size: 1rem; color: #888;">يرجى الربط قبل التقديم</h2>
            
            <h1>تقديم طاقم الإدارة</h1>
            <form action="https://formspree.io/f/mykolbgw" method="POST">
                <div class="form-group">
                    <label>الاسم داخل اللعبة (IGN):</label>
                    <input type="text" name="ign" required>
                </div>
                <div class="form-group">
                    <label>الرتبة المطلوبة:</label>
                    <select name="role">
                        <option value="Helper">Helper</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Admin">Admin</option>
                        <option value="YouTube/TikTok">Content Creator</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الخبرة (أكثر من 20 حرف):</label>
                    <textarea name="experience" id="exp" minlength="20" required></textarea>
                </div>
                <div class="form-group">
                    <label>حساب الديسكورد:</label>
                    <input type="text" name="discord" id="discord-input" required>
                </div>
                <button type="submit" class="submit-btn">إرسال الطلب 📥</button>
            </form>
        </div>
    </div>

    <div class="footer">
        🛡️ Secured by <b>Sherlock Systems</b> | 2026
    </div>

    <script>
        // التنقل بين الخانات بلا ما تتبدل الصفحة
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // نسخ الـ IP
        function copyIP() {
            const ip = document.getElementById('server-ip').innerText;
            navigator.clipboard.writeText(ip);
            alert("تم نسخ IP السيرفر! نتمناو نشوفوك داخل.");
        }

        // نظام الربط (نفس اللي كان)
        function discordLogin() {
            const user = prompt("دخل Discord Username:");
            if(user) {
                document.getElementById('discord-input').value = user;
                document.getElementById('login-status').innerText = "✅ تم الربط: " + user;
                document.getElementById('login-status').style.color = "#2ecc71";
            }
        }
    </script>
</body>
</html>
