<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TARBOUCH SMP | Sherlock Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* لمنع التحديد العشوائي */
        }

        body {
            min-height: 100vh;
            background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/screenshots/1-16-1.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Dark Overlay ماينكرافت */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
            backdrop-filter: blur(2px);
        }

        /* الحاوية الرئيسية */
        .minecraft-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            background: rgba(30, 30, 40, 0.55);
            border-radius: 28px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.1);
            border: 2px solid #ffcc33;
            backdrop-filter: blur(4px);
        }

        /* Pixel Art Logo - طربوش مغربي */
        .pixel-logo {
            text-align: center;
            margin-bottom: 30px;
            filter: drop-shadow(6px 8px 0px #2a1e0e);
        }
        .logo-art {
            display: inline-block;
            background-color: #c33c23; /* أحمر مغربي */
            padding: 12px 20px 14px 20px;
            border-radius: 0px;
            box-shadow: inset 0px -4px 0 #7a2a18, 0 6px 0 #3a1c0a;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            color: #f7e05e;
            text-shadow: 2px 2px 0 #5a2e1a;
            letter-spacing: 2px;
        }
        /* طربوش حرفي بالـ CSS grid بكسلي */
        .tarboosh-pixel {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(15, 14px);
            grid-auto-rows: 14px;
            background: #2b1a0e;
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #d4a373, 0 6px 0 #4d2e14;
        }
        .pixel-cell {
            width: 14px;
            height: 14px;
            background-color: #996633;
        }
        /* الألوان الخاصة بالطربوش (أحمر, ذهبي, أسود) */
        .pixel-cell.red { background-color: #b52b1e; }
        .pixel-cell.gold { background-color: #e5b83c; }
        .pixel-cell.black { background-color: #2d2218; }
        .pixel-cell.brown { background-color: #8b5a2b; }

        /* الأزرار الرئيسية العمودية 3D */
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin: 40px 0 30px;
            align-items: center;
        }
        .minecraft-btn {
            position: relative;
            background: #3b2a1f;
            border: none;
            width: 280px;
            padding: 18px 0;
            font-family: 'Press Start 2P', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffdd99;
            text-shadow: 2px 2px 0 #4d2a14;
            cursor: pointer;
            box-shadow: 0 9px 0 #1f140b;
            transition: all 0.08s linear;
            border-radius: 16px;
            letter-spacing: 2px;
            background-image: linear-gradient(to bottom, #5e3e2a, #2f241b);
            text-align: center;
        }
        .minecraft-btn:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #1f140b;
        }
        .minecraft-btn::before {
            content: "";
            position: absolute;
            top: 4px;
            left: 6px;
            right: 6px;
            bottom: 4px;
            background: rgba(255,215,130,0.2);
            border-radius: 12px;
            pointer-events: none;
        }

        /* تخصيص الألوان لكل زر */
        .btn-home { border-bottom: 4px solid #daa520; background-image: linear-gradient(to bottom, #7a502e, #3b2a1f); }
        .btn-staff { border-bottom: 4px solid #c41e1e; background-image: linear-gradient(to bottom, #8b3c2c, #4a241a); }
        .btn-discord { background-image: linear-gradient(to bottom, #2c5e7a, #1f3f50); border-bottom: 4px solid #5dade2; }

        /* كارت الاستمارة 3D */
        .staff-card {
            background: #2c2618;
            border: 3px solid #c9a03d;
            border-radius: 24px;
            padding: 25px 20px;
            margin-top: 15px;
            margin-bottom: 25px;
            box-shadow: 0 14px 0 #5a3e22, inset 0 1px 2px rgba(255,245,170,0.5);
            transition: all 0.2s;
        }
        .staff-card h3 {
            color: #f1d978;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 0 #382818;
        }
        .form-group {
            margin-bottom: 22px;
            direction: rtl;
        }
        .form-group label {
            display: block;
            color: #ffd966;
            font-size: 0.75rem;
            margin-bottom: 8px;
            font-family: monospace;
            font-weight: bold;
        }
        .minecraft-input {
            width: 100%;
            padding: 12px;
            background: #1e1a12;
            border: 2px solid #cb9e4a;
            color: #ffefb9;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border-radius: 12px;
            outline: none;
            transition: 0.08s linear;
            box-shadow: inset 0 2px 3px #00000055, 0 1px 0 #624c2c;
        }
        .minecraft-input:focus {
            border-color: #e6b422;
            background: #2a241a;
        }
        .char-counter {
            font-size: 0.7rem;
            color: #e6bc74;
            margin-top: 6px;
            text-align: left;
            direction: ltr;
        }
        .error-msg {
            color: #ff9966;
            font-size: 0.65rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .submit-btn {
            background: #d6a235;
            width: 100%;
            padding: 14px;
            font-family: 'Press Start 2P', monospace;
            font-weight: bold;
            color: #2a2412;
            text-shadow: none;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0 #704e1c;
            transition: 0.05s linear;
            font-size: 0.8rem;
        }
        .submit-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #704e1c;
        }
        .success-message {
            background: #2b6e3b;
            border-right: 8px solid #f7d44a;
            padding: 14px;
            border-radius: 20px;
            color: #ffe9aa;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            box-shadow: 0 4px 0 #135c24;
        }
        footer {
            text-align: center;
            margin-top: 35px;
            color: #bd9e5a;
            font-size: 0.65rem;
            font-family: monospace;
            border-top: 1px dashed #6f542f;
            padding-top: 18px;
            letter-spacing: 1px;
        }
        .hidden {
            display: none;
        }
        .discord-requirement {
            font-size: 0.7rem;
            background: #221f15;
            border-radius: 14px;
            padding: 8px;
            margin-bottom: 15px;
            color: #eac264;
            text-align: center;
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        @media (max-width: 550px) {
            .minecraft-btn { width: 220px; font-size: 0.9rem; padding: 12px 0; }
            .pixel-grid { transform: scale(0.85); }
        }
    </style>
</head>
<body>
<div class="minecraft-container" id="appRoot">
    <!-- Pixel Logo طربوش مغربي -->
    <div class="pixel-logo">
        <div class="tarboosh-pixel">
            <div class="pixel-grid" id="pixelTarboosh">
                <!-- 15x15 pixel art طربوش أحمر مغربي مع ذهبي -->
                <!-- سيتم إنشاؤه بالجافاسكريبت للدقة، لكن يمكن كتابة html بسيط -->
            </div>
        </div>
        <div class="logo-art">
            ⚡ TARBOUCH SMP ⚡
        </div>
    </div>

    <!-- الأزرار الرئيسية الثلاثة (الصفحة الرئيسية) -->
    <div class="nav-buttons" id="mainNav">
        <button class="minecraft-btn btn-home" id="homeBtn">🏠 الرئيسية</button>
        <button class="minecraft-btn btn-staff" id="staffApplyBtn">📜 تقديم Staff</button>
        <button class="minecraft-btn btn-discord" id="discordBtn">💬 ديسكورد</button>
    </div>

    <!-- حاوية المحتوى الديناميكي -->
    <div id="dynamicContent">
        <!-- الصفحة الرئيسية الافتراضية: رسالة ترحيب بسيطة (اختيارية) لكن "الصفحة الرئيسية" بها فقط الأزرار الموجودة بالأعلى، ولكن نعرض تصميم نظيف -->
        <div id="homeMessage" style="text-align: center; color: #eace83; margin: 15px 0; font-size: 0.8rem;">
            ★ سيرفر TARBOUCH SMP ★ <br>
            المغرب | ماينكرافت برو
        </div>
    </div>

    <footer>
        Secured by Sherlock Systems
    </footer>
</div>

<script>
    // بناء Pixel Art للطربوش المغربي (شكل قبعة طربوش حمراء و ذهبية)
    function buildPixelTarboosh() {
        const container = document.getElementById('pixelTarboosh');
        if(!container) return;
        container.innerHTML = '';
        // تصميم 15x15 طربوش أحمر (أطراف سوداء وذهبية)
        const pattern = [];
        // صفوف 15
        for(let row = 0; row < 15; row++) {
            let line = [];
            for(let col = 0; col < 15; col++) {
                let type = 'brown'; // base
                // الجزء العلوي القمة ذهبية
                if(row === 0 && col >= 6 && col <= 8) type = 'gold';
                else if(row === 1 && col >= 5 && col <= 9) type = 'gold';
                else if(row === 2 && col >= 4 && col <= 10) type = 'gold';
                // جسم الطربوش احمر
                else if(row >= 3 && row <= 12 && col >= 2 && col <= 12) {
                    if((row > 4 && row < 11) && (col > 2 && col < 12)) type = 'red';
                    else type = 'red';
                }
                else if(row === 13 && col >= 3 && col <= 11) type = 'black';
                else if(row === 14 && col >= 4 && col <= 10) type = 'black';
                // زخرفة ذهبية جانبية
                if(row === 7 && (col === 3 || col === 11)) type = 'gold';
                if(row === 8 && (col === 3 || col === 11)) type = 'gold';
                // حواف سوداء خفيفة للتميز
                if((row === 4 || row === 5) && (col === 2 || col === 12)) type = 'black';
                if(type === 'brown' && (col === 0 || col === 14 || row === 0 || row === 14)) type = 'black';
                line.push(type);
            }
            pattern.push(line);
        }
        for(let r=0; r<15; r++) {
            for(let c=0; c<15; c++) {
                const cell = document.createElement('div');
                cell.classList.add('pixel-cell');
                let cellType = pattern[r][c];
                if(cellType === 'red') cell.classList.add('red');
                else if(cellType === 'gold') cell.classList.add('gold');
                else if(cellType === 'black') cell.classList.add('black');
                else cell.classList.add('brown');
                container.appendChild(cell);
            }
        }
    }

    // DOM elements
    const homeBtn = document.getElementById('homeBtn');
    const staffBtn = document.getElementById('staffApplyBtn');
    const discordBtn = document.getElementById('discordBtn');
    const dynamicDiv = document.getElementById('dynamicContent');

    let currentView = 'home';

    // مسح المحتوى الديناميكي وعرض القسم المناسب
    function showHome() {
        dynamicDiv.innerHTML = `
            <div id="homeMessage" style="text-align: center; color: #eace83; margin: 15px 0; font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 24px;">
                ✨ اهلاً بك في TARBOUCH SMP ✨<br>
                سيرفير ماينكرافت بطابع مغربي أصيل.<br><br>
                🎮 استخدم الأزرار للتنقل.
            </div>
        `;
        currentView = 'home';
    }
    
    // استمارة التقديم Staff مع شرط الخبرة 20 حرف + ربط ديسكورد
    function showStaffForm() {
        dynamicDiv.innerHTML = `
            <div class="staff-card">
                <h3>📝 تقديم طلب Staff</h3>
                <div class="discord-requirement">
                    🔗 يجب كتابة اسم المستخدم في ديسكورد (مثال: Ahmed#1234) قبل الإرسال
                </div>
                <div class="form-group">
                    <label>🎮 الاسم داخل اللعبة (Minecraft IGN)</label>
                    <input type="text" id="ignName" class="minecraft-input" placeholder="TARBOUCH_Player" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>⭐ الرتبة المطلوبة (Mod / Admin / Helper)</label>
                    <input type="text" id="rank" class="minecraft-input" placeholder="مثال: Helper">
                </div>
                <div class="form-group">
                    <label>📜 الخبرة (شرط : 20 حرفاً على الأقل)</label>
                    <textarea id="experience" rows="3" class="minecraft-input" placeholder="اكتب خبرتك في الإدارة أو ماينكرافت..."></textarea>
                    <div class="char-counter" id="charCount">عدد الحروف: 0 / 20 (الحد الأدنى)</div>
                    <div id="expError" class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label>💬 ربط ديسكورد (username#0000)</label>
                    <input type="text" id="discordUsername" class="minecraft-input" placeholder="Tarbouch#1234">
                    <div id="discordError" class="error-msg"></div>
                </div>
                <button id="submitStaffBtn" class="submit-btn">🚀 إرسال الطلب</button>
                <div id="formResultMsg"></div>
            </div>
        `;
        // إضافة الأحداث
        const expTextarea = document.getElementById('experience');
        const charCounterSpan = document.getElementById('charCount');
        const expErrorDiv = document.getElementById('expError');
        const discordInput = document.getElementById('discordUsername');
        const discordErrorDiv = document.getElementById('discordError');
        const submitBtn = document.getElementById('submitStaffBtn');
        
        function updateCharCount() {
            const len = expTextarea.value.length;
            charCounterSpan.innerText = `عدد الحروف: ${len} / 20 (الحد الأدنى)`;
            if(len < 20) {
                expErrorDiv.innerText = '⚠️ الخبرة يجب أن تحتوي على 20 حرفاً على الأقل';
                submitBtn.disabled = true;
            } else {
                expErrorDiv.innerText = '✔️ جيد';
                submitBtn.disabled = false;
            }
            // إعادة التحقق من الديسكورد أيضاً
            validateDiscord();
        }
        
        function validateDiscord() {
            const discordVal = discordInput.value.trim();
            if(discordVal.length === 0) {
                discordErrorDiv.innerText = '❌ مطلوب كتابة اسم الديسكورد (مثال: name#1234)';
                if(submitBtn) submitBtn.disabled = true;
                return false;
            } else if(!discordVal.match(/^[\w\d_]+#\d{4}$/)) {
                discordErrorDiv.innerText = '❌ صيغة ديسكورد غير صحيحة (يجب أن تحتوي على # وأربعة أرقام)';
                if(submitBtn) submitBtn.disabled = true;
                return false;
            } else {
                discordErrorDiv.innerText = '✅ صالح';
                if(expTextarea && expTextarea.value.length >= 20) submitBtn.disabled = false;
                return true;
            }
        }
        
        expTextarea.addEventListener('input', updateCharCount);
        discordInput.addEventListener('input', () => {
            validateDiscord();
            if(expTextarea && expTextarea.value.length >= 20 && validateDiscord()) {
                submitBtn.disabled = false;
            } else {
                if(submitBtn) submitBtn.disabled = true;
            }
        });
        
        // عند الإرسال
        submitBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const ign = document.getElementById('ignName').value.trim();
            const rank = document.getElementById('rank').value.trim();
            const experience = expTextarea.value.trim();
            const discordUser = discordInput.value.trim();
            
            let isValid = true;
            if(ign === "") {
                document.getElementById('ignName').style.borderColor = "#ff8866";
                isValid = false;
            } else document.getElementById('ignName').style.borderColor = "#cb9e4a";
            if(rank === "") {
                document.getElementById('rank').style.borderColor = "#ff8866";
                isValid = false;
            } else document.getElementById('rank').style.borderColor = "#cb9e4a";
            if(experience.length < 20) {
                expErrorDiv.innerText = '⚠️ الخبرة أقل من 20 حرفاً';
                isValid = false;
            }
            if(!discordUser.match(/^[\w\d_]+#\d{4}$/)) {
                discordErrorDiv.innerText = '❌ اسم ديسكورد غير صالح # وأربعة أرقام';
                isValid = false;
            }
            if(!isValid) {
                const msgDiv = document.getElementById('formResultMsg');
                msgDiv.innerHTML = '<div class="error-msg" style="background:#581010; padding:8px;">⚠️ الرجاء تعبئة الحقول بشكل صحيح.</div>';
                return;
            }
            // نجاح الإرسال - رسالة بالدارجة
            const resultDiv = document.getElementById('formResultMsg');
            resultDiv.innerHTML = `
                <div class="success-message">
                    ✅ تم الإرسال بنجاح! حل Ticket دابا في الديسكورد 🎫<br>
                    شكراً ${ign}، سنراجع طلبك قريباً.
                </div>
            `;
            // مسح الحقول اختيارياً (يمكن الإبقاء مع تعطيل الإرسال المتكرر)
            submitBtn.disabled = true;
            setTimeout(() => {
                // لا نعيد توجيه، الرسالة تبقى
            }, 100);
        });
        updateCharCount();
        validateDiscord();
        currentView = 'staff';
    }
    
    // زر ديسكورد: فتح رابط دعوة (رابط وهمي لكن يمكن استبداله برابط حقيقي)
    function openDiscordInvite() {
        // في Prompt طلب "زر ديسكورد" يكتب اسم المستخدم قبل الإرسال ولكن هذا الزر خاص بالـ invite? لكن prompt: زر ديسكورد يوجه الى رابط ديسكورد السيرفر
        // ولتجنب التعقيد زر ديسكورد يفتح رابط دعوة مع رسالة تحذيرية بسيطة تنبيه "نسخ الرابط"
        const discordLink = "https://discord.gg/tarbouchsmp";
        // إنشاء عنصر مؤقت للربط
        const tempDiv = dynamicDiv;
        dynamicDiv.innerHTML = `
            <div class="staff-card" style="text-align:center;">
                <h3>💬 انضم إلى ديسكورد TARBOUCH SMP</h3>
                <p style="color:#ffdd99; margin:15px 0;">رابط السيرفر الرسمي:</p>
                <div style="background:#15100a; padding:12px; border-radius:20px; word-break:break-all; font-family:monospace;">${discordLink}</div>
                <button id="copyDiscordBtn" class="minecraft-btn" style="width:80%; margin-top:25px; padding:12px; font-size:0.8rem;">📋 نسخ الرابط</button>
                <div id="copyMsg" class="success-message hidden" style="margin-top:14px;"></div>
                <button id="backHomeFromDisc" class="minecraft-btn" style="background:#594a2e; margin-top: 18px; width:60%;">↩️ العودة للرئيسية</button>
            </div>
        `;
        document.getElementById('copyDiscordBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(discordLink).then(() => {
                const msgDiv = document.getElementById('copyMsg');
                msgDiv.classList.remove('hidden');
                msgDiv.innerHTML = '✅ تم نسخ رابط الديسكورد!';
                setTimeout(() => msgDiv.classList.add('hidden'), 2000);
            });
        });
        document.getElementById('backHomeFromDisc')?.addEventListener('click', () => {
            showHome();
        });
        currentView = 'discord';
    }
    
    // معالجة التنقل بين الأزرار
    homeBtn.addEventListener('click', () => {
        showHome();
    });
    staffBtn.addEventListener('click', () => {
        showStaffForm();
    });
    discordBtn.addEventListener('click', () => {
        openDiscordInvite();
    });
    
    // تشغيل الافتراضي: الصفحة الرئيسية تحتوي فقط على الأزرار (لكن نضيف عنصر ترحيب خفيف)
    buildPixelTarboosh();
    showHome();
</script>
</body>
</html>
